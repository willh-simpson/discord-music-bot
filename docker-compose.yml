version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: music_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  elixir:
    build:
      context: ./elixir_service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      MIX_ENV: dev
      PHX_HOST: localhost
      PORT: "4000"
      SECRET_KEY_BASE: ${ELIXIR_SECRET_KEY_BASE}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./elixir_service:/app
      - elixir_deps:/app/deps
      - elixir_build:/app/_build

  django:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: "True"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: music_dev
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ml_service:/app

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      ELIXIR_URL: http://elixir:4000
      DJANGO_URL: http://django:8000
    depends_on:
      - elixir
      - django
    volumes:
      - ./bot:/app

volumes:
  pgdata:
  elixir_deps:
  elixir_build: